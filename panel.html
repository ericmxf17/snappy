<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* Ink & amber.
     The old blue/purple gradient glass was the problem: it's the house style of
     every AI demo, and it also washed the text out. This is one warm accent on a
     near-black scrim — the contrast comes from the scrim, not from shouting. */
  :root {
    --ink:      rgba(14, 16, 19, .78);   /* scrim over the macOS blur */
    --text:     #F2EFE9;                 /* warm off-white, not pure #fff */
    --dim:      #9AA0A8;
    --faint:    #6C727A;
    --amber:    #E0A340;
    --line:     rgba(255, 255, 255, .09);
    --card:     rgba(255, 255, 255, .045);
  }

  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font: 13px/1.55 "SF Pro Text", -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    background: transparent;
    -webkit-font-smoothing: antialiased;
    user-select: none; cursor: default;
  }

  /* A flat scrim under everything. This is what makes the text readable no matter
     what's on the desktop behind the glass — the old build relied on the blur
     alone and the answer sat on whatever wallpaper happened to be there. */
  #scrim { position: fixed; inset: 0; background: var(--ink); z-index: 0; }

  /* One slow warm glow, low and desaturated. Presence, not a light show. */
  #glow { position: fixed; inset: -40%; z-index: 0; filter: blur(70px);
          opacity: .12; transition: opacity .7s ease; }
  .orb { position: absolute; width: 55%; height: 55%; border-radius: 50%;
         background: var(--amber); transition: background 1s ease; }
  .o1 { top: -8%; left: -6%;  animation: d1 26s ease-in-out infinite; }
  .o2 { bottom: -14%; right: -8%; background: #5A6270;
        animation: d2 31s ease-in-out infinite; }

  @keyframes d1 { 0%,100%{transform:translate(0,0) scale(1)}    50%{transform:translate(26%,18%) scale(1.15)} }
  @keyframes d2 { 0%,100%{transform:translate(0,0) scale(1.1)}  50%{transform:translate(-18%,-14%) scale(.9)} }

  body[data-status="listening"] #glow { opacity: .22; }
  body[data-status="thinking"]  #glow { opacity: .18; }

  /* ---- layout ---------------------------------------------------------- */
  #shell { position: relative; z-index: 1; height: 100%;
           display: flex; flex-direction: column; padding: 15px 16px 14px; gap: 12px; }

  header { display: flex; align-items: center; gap: 8px; flex: none; }
  .mark { font-weight: 600; font-size: 12px; letter-spacing: .01em; color: var(--text); }
  .status { margin-left: auto; display: flex; align-items: center; gap: 6px;
            font-size: 10px; font-weight: 500; color: var(--faint);
            letter-spacing: .04em; text-transform: uppercase; }
  .led { width: 5px; height: 5px; border-radius: 50%; background: var(--faint); }
  body[data-status="listening"] .led,
  body[data-status="thinking"]  .led { background: var(--amber);
                                       box-shadow: 0 0 7px rgba(224,163,64,.9);
                                       animation: blink 1.1s infinite; }
  body[data-status="answered"]  .led { background: var(--amber); box-shadow: 0 0 7px rgba(224,163,64,.7); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.28} }

  /* Close button — the panel stays put until you dismiss it. */
  .x { width: 18px; height: 18px; border-radius: 50%; display: grid; place-items: center;
       color: var(--faint); font-size: 13px; line-height: 1; cursor: pointer;
       transition: background .12s, color .12s; }
  .x:hover { background: rgba(255,255,255,.10); color: var(--text); }

  /* ---- waveform -------------------------------------------------------- */
  #wave { display: none; align-items: center; justify-content: center;
          gap: 3px; height: 34px; flex: none; }
  body[data-status="listening"] #wave { display: flex; }
  #wave i { width: 3px; border-radius: 2px; background: var(--amber); opacity: .9;
            height: 3px; transition: height .07s ease-out; }

  /* ---- hero ------------------------------------------------------------ */
  .hero { flex: none; }
  /* Mono, tabular. Money in a proportional font is the tell of a toy; the digits
     also stop jittering as the value updates. */
  .value { font: 500 29px/1.15 ui-monospace, "SF Mono", Menlo, monospace;
           letter-spacing: -.02em; font-variant-numeric: tabular-nums; color: var(--text); }
  .sub { font-size: 11px; color: var(--dim); margin-top: 4px; }

  /* Freshness, shown rather than claimed. A number with no timestamp that never moves
     looks exactly like a number that is right. The dot pulses on every re-read, so
     "live" is something you can watch instead of something we assert. */
  .fresh { font-size: 10px; color: var(--faint); margin-top: 5px;
           display: flex; align-items: center; gap: 5px; height: 12px; }
  .fresh i { width: 4px; height: 4px; border-radius: 50%; background: var(--faint);
             flex: none; }
  .fresh.beat i { animation: beat 1.1s ease-out; }
  @keyframes beat {
    0%   { background: var(--amber); box-shadow: 0 0 0 0 rgba(224,163,64,.55); }
    100% { background: var(--faint); box-shadow: 0 0 0 6px rgba(224,163,64,0); }
  }
  /* ---- numbers that moved ------------------------------------------------
     Every figure on screen carries a key and its value. When a refresh brings a
     different number, that number — and only that number — flashes, in the direction
     it went. Green up, red down: the one convention in finance you can rely on a
     stranger already knowing.

     Flashing everything on every render would be noise, and noise is indistinguishable
     from nothing. The point is to draw the eye to what actually changed. */
  .up, .down { animation: pulseNum .9s ease-out; border-radius: 3px; }
  .up   { color: #6FBF8B !important; }
  .down { color: #E0705F !important; }
  @keyframes pulseNum {
    0%   { background: currentColor; filter: brightness(2); }
    12%  { background: color-mix(in srgb, currentColor 22%, transparent); }
    100% { background: transparent; }
  }

  /* The headline number is bigger, so it gets a longer, calmer version. */
  .value.up, .value.down { animation: pulseNum 1.3s ease-out; }

  /* How much it moved, next to the net worth. A direction with no size is a shrug. */
  .delta { font-size: 11px; margin-left: 8px; font-weight: 600;
           font-family: ui-monospace, Menlo, monospace;
           font-variant-numeric: tabular-nums;
           opacity: 0; transition: opacity .3s ease; }
  .delta.show { opacity: 1; }
  .delta.up   { color: #6FBF8B; }
  .delta.down { color: #E0705F; }

  @media (prefers-reduced-motion: reduce) {
    .fresh.beat i, .up, .down { animation: none; }
  }
  .trig { font-size: 11px; color: var(--faint); margin-top: 5px; }

  /* ---- tabs --------------------------------------------------------------
     The conversation and the portfolio are different things and were sharing one
     scroll: ask three questions and your holdings are a screen and a half below the
     fold. They get their own panes.

     Anything ACTIONABLE — a confirm card, an account picker — is pinned above the tabs
     and shows on both. A trade you have to approve must never be one click away behind
     a tab you aren't looking at. */
  .tabs { display: flex; gap: 2px; flex: none; padding: 2px;
          background: rgba(255,255,255,.04); border-radius: 8px; }
  .tabs button {
    flex: 1; background: none; border: 0; cursor: pointer; color: var(--faint);
    font: 600 10px/1 "SF Pro Text", -apple-system, sans-serif;
    letter-spacing: .08em; text-transform: uppercase;
    padding: 7px 0; border-radius: 6px; transition: background .12s, color .12s;
  }
  .tabs button:hover { color: var(--dim); }
  .tabs button[aria-selected="true"] { background: rgba(255,255,255,.08); color: var(--text); }
  .tabs button:focus-visible { outline: 1px solid var(--amber); outline-offset: -1px; }

  /* Pinned: always on screen, whichever tab is showing. */
  #pinned { flex: none; display: flex; flex-direction: column; gap: 9px; }
  #pinned:empty { display: none; }

  /* ---- scrolling body -------------------------------------------------- */
  #feed { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 9px;
          margin: 0 -4px; padding: 0 4px; }
  #feed::-webkit-scrollbar { width: 0; }
  #feed:empty::after {
    content: attr(data-empty); display: block; text-align: center;
    color: var(--faint); font-size: 11px; padding: 22px 0;
  }

  .card { background: var(--card); border: 1px solid var(--line);
          border-radius: 11px; padding: 11px 12px; }

  .q { font-weight: 500; color: var(--text); font-size: 12px; }
  .q::before { content: "“"; } .q::after { content: "”"; }

  /* ---- tool trace ------------------------------------------------------ */
  .trace { margin-top: 9px; display: flex; flex-direction: column; gap: 5px; }
  .row { display: flex; align-items: center; gap: 7px; font-size: 11px;
         animation: pop .22s ease-out; }
  @keyframes pop { from { opacity:0; transform: translateY(3px) } to { opacity:1 } }
  .row .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--amber);
              flex: none; }
  .row .nm { font: 400 11px ui-monospace, "SF Mono", Menlo, monospace; color: var(--amber);
             opacity: .95; }
  .row .qy { color: var(--faint); overflow: hidden;
             text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .row .ms { color: var(--faint); font: 400 11px ui-monospace, Menlo, monospace;
             font-variant-numeric: tabular-nums; }

  /* ---- answer ---------------------------------------------------------- */
  .ans { margin-top: 11px; }
  /* The spoken sentence. Bigger and lighter than the detail — it's the answer, and
     it should read like a sentence someone said, not like a row in a table. */
  .ans .lead { font-size: 14px; line-height: 1.5; color: var(--text); font-weight: 500;
               letter-spacing: -.005em; }
  .ans .det  { margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--line);
               color: var(--dim); font-size: 12px; line-height: 1.65; }
  .ans .det div { padding: 1px 0; }
  .ans b { color: var(--text); font-weight: 600; }
  .caret { display: inline-block; width: 2px; height: 14px; background: var(--amber);
           vertical-align: -2px; margin-left: 3px; animation: blink .9s infinite; }

  .src { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--line);
         font-size: 10px; color: var(--faint); }
  .src span { margin-right: 9px; }

  /* ---- holdings -------------------------------------------------------- */
  .hd { font-size: 9px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
        color: var(--faint); margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  td { padding: 4px 0; }
  .sym { font-weight: 600; }
  .num { text-align: right; font-family: ui-monospace, Menlo, monospace;
         font-variant-numeric: tabular-nums; }
  .wt { color: var(--dim); }
  /* A position split across accounts. Amber because it's the finding, not a footnote:
     each brokerage shows you half of it and calls that the whole. */
  .split { margin-left: 6px; font-size: 9px; font-weight: 600; letter-spacing: .06em;
           color: var(--amber); border: 1px solid rgba(224,163,64,.35);
           border-radius: 3px; padding: 1px 4px; vertical-align: 1px; }

  /* ---- accounts, expandable ---------------------------------------------
     "What do I own" is the combined table. This answers "and where is it". */
  .acct { border-top: 1px solid var(--line); }
  .acct:first-of-type { border-top: 0; }
  .acct > .hdr {
    display: flex; align-items: center; gap: 8px; width: 100%;
    background: none; border: 0; padding: 9px 0; cursor: pointer;
    color: var(--text); font: inherit; text-align: left;
  }
  .acct > .hdr:hover .nm { color: var(--amber); }
  .acct > .hdr:focus-visible { outline: 1px solid var(--amber); outline-offset: 2px; }
  .acct .caretx { color: var(--faint); font-size: 9px; width: 8px; flex: none;
                  transition: transform .15s ease; }
  .acct.open .caretx { transform: rotate(90deg); }
  .acct .nm { font-size: 12px; font-weight: 600; transition: color .12s; }
  .acct .amt { margin-left: auto; font-size: 12px;
               font-family: ui-monospace, Menlo, monospace;
               font-variant-numeric: tabular-nums; color: var(--dim); }
  .acct .body { display: none; padding: 2px 0 10px 16px; }
  .acct.open .body { display: block; }
  .acct .body .cashrow { display: flex; font-size: 11px; color: var(--faint);
                         padding: 3px 0; border-top: 1px solid var(--line); margin-top: 4px; }
  .acct .body .cashrow span:last-child { margin-left: auto;
                                         font-family: ui-monospace, Menlo, monospace; }
  .acct .empty { font-size: 11px; color: var(--faint); padding: 3px 0; }

  .hint { color: var(--dim); font-size: 12px; line-height: 1.9; text-align: center; }
  kbd { background: rgba(255,255,255,.10); border: 1px solid var(--line); border-radius: 4px;
        padding: 1px 5px; font: 11px ui-monospace, Menlo, monospace; color: var(--text); }

  /* ---- accessibility banner -------------------------------------------- */
  #banner { display: none; flex: none; font-size: 11px; line-height: 1.5;
            background: rgba(224,163,64,.10); border: 1px solid rgba(224,163,64,.30);
            border-radius: 10px; padding: 9px 11px; color: #F0CE96; }
  body[data-hotkey="off"] #banner { display: block; }
  body[data-hotkey="off"] .opt { opacity: .38; text-decoration: line-through; }

  /* ---- notice ---------------------------------------------------------- */
  /* Snappy has no voice, so anything it would have said lands here. */
  .notice { font-size: 12px; color: var(--text); background: rgba(255,255,255,.06);
            border: 1px solid var(--line); border-radius: 9px; padding: 8px 11px; }

  /* ---- proposed trade -------------------------------------------------- */
  /* Deliberately the loudest thing on screen. This is the only card that can
     move money, and the dollar cost is the headline because that's the figure
     that makes a misheard "fifty" for "fifteen" obvious. */
  .trade { border: 1px solid rgba(224,163,64,.55); background: rgba(224,163,64,.09);
           border-radius: 11px; padding: 12px; }
  .trade .top { display: flex; align-items: baseline; gap: 7px; }
  .trade .act { font: 600 11px "SF Pro Text", sans-serif; letter-spacing: .08em;
                text-transform: uppercase; color: var(--amber); }
  .trade .sym { font: 600 15px ui-monospace, "SF Mono", Menlo, monospace; color: var(--text); }
  .trade .qty { font-size: 12px; color: var(--dim); margin-left: auto; }
  /* The company NAME, not just the ticker. SnapTrade's symbol search ranks
     "Apple Hospitality REIT" above "Apple Inc.", so a wrong ticker is a real
     possibility — and the read-back is where you catch it. "AZQ · Amazon.com CDR"
     looks wrong in a way that "AZQ" alone does not. */
  .trade .co { font-size: 11px; color: var(--dim); margin-top: 4px; }
  .trade .cost { font: 500 24px/1.2 ui-monospace, "SF Mono", Menlo, monospace;
                 color: var(--text); margin-top: 8px; font-variant-numeric: tabular-nums; }
  .trade .of { font-size: 11px; color: var(--dim); margin-top: 3px; }
  .trade .row2 { display: flex; gap: 8px; margin-top: 11px; }
  .trade button { flex: 1; border: 0; border-radius: 8px; padding: 8px;
                  font: 600 12px "SF Pro Text", sans-serif; cursor: pointer; }
  .trade .go { background: var(--amber); color: #14110B; }
  .trade .no { background: rgba(255,255,255,.10); color: var(--text); }
  .trade .say { text-align: center; font-size: 11px; color: var(--faint); margin-top: 8px; }
  /* WHICH account. With several accounts the ticker and the size no longer describe
     the order — the destination is part of what the user is agreeing to, so it is
     printed in the same amber as the action, not buried in grey. */
  .trade .acct { font-size: 11px; color: var(--amber); margin-top: 6px;
                 letter-spacing: .04em; text-transform: uppercase; }

  /* ---- account picker --------------------------------------------------
     A real list, not a <select>. A dropdown hides the options behind a click and
     shows a default already chosen — and "already chosen" is the exact thing we are
     trying not to do with someone's money. Every account is visible, with what it
     holds, and none is preselected. */
  .pick .opt { display: flex; align-items: baseline; gap: 8px; width: 100%;
               text-align: left; cursor: pointer; margin-top: 6px;
               background: rgba(255,255,255,.05); color: var(--text);
               border: 1px solid var(--line); border-radius: 9px;
               padding: 9px 11px; font: inherit;
               transition: background .12s, border-color .12s; }
  .pick .opt:hover { background: rgba(224,163,64,.14); border-color: var(--amber); }
  .pick .opt .nm  { font-weight: 600; font-size: 12px; }
  .pick .opt .vl  { margin-left: auto; color: var(--dim); font-size: 11px;
                    font-family: ui-monospace, Menlo, monospace;
                    font-variant-numeric: tabular-nums; }

  /* One confirmation for a whole batch widens the blast radius, so the batch has
     to be visible. A list you can't see is a list you can't refuse. */
  .batch { margin-top: 9px; max-height: 150px; overflow-y: auto;
           border-top: 1px solid rgba(224,163,64,.25); padding-top: 7px; }
  .batch::-webkit-scrollbar { width: 0; }
  .brow { display: flex; gap: 8px; align-items: baseline; padding: 2px 0;
          font: 11px ui-monospace, "SF Mono", Menlo, monospace; color: var(--dim); }
  .brow .bsym { color: var(--text); font-weight: 600; }
  .brow .bst { margin-left: auto; color: var(--faint); font-size: 10px; }

  /* ---- composer -------------------------------------------------------- */
  #composer { flex: none; display: flex; align-items: center; gap: 8px;
              background: rgba(255,255,255,.05); border: 1px solid var(--line);
              border-radius: 10px; padding: 8px 11px; transition: border-color .15s; }
  #composer:focus-within { border-color: rgba(224,163,64,.55); }
  #ask { flex: 1; min-width: 0; background: none; border: 0; outline: none;
         color: var(--text); font: 12px "SF Pro Text", -apple-system, sans-serif;
         /* body sets these globally; a field you can't select into feels broken. */
         user-select: text; -webkit-user-select: text; cursor: text; }
  #ask::placeholder { color: var(--faint); }
  #send { flex: none; font: 11px ui-monospace, Menlo, monospace; color: var(--faint); }

  .disclaimer { flex: none; text-align: center; font-size: 9px; letter-spacing: .04em;
                color: var(--faint); opacity: .7; margin-top: 7px; }
</style>
</head>

<body data-status="idle">
  <div id="scrim"></div>
  <div id="glow"><div class="orb o1"></div><div class="orb o2"></div></div>

  <div id="shell">
    <header>
      <span class="mark">Snappy</span>
      <span class="status"><span class="led"></span><span id="statusText">Ready</span></span>
      <span class="x" id="close" title="Close">✕</span>
    </header>

    <div id="wave"></div>

    <div class="hero">
      <div style="display:flex; align-items:baseline">
        <span class="value" id="value">—</span>
        <span class="delta" id="delta"></span>
      </div>
      <div class="sub" id="sub">connecting…</div>
      <div class="fresh" id="fresh"></div>
      <div class="trig"><span class="opt">Hold <kbd>⌥</kbd> to talk</span> · or type below</div>
    </div>

    <div id="banner">
      <b>⌥ is off.</b> Grant Accessibility in System&nbsp;Settings → Privacy&nbsp;&amp; Security
      → Accessibility, then relaunch Snappy. Until then, type below — or right-click the
      menubar icon and choose <b>Ask Snappy</b>.
    </div>

    <div id="pinned"></div>

    <div class="tabs" role="tablist">
      <button id="tabAsk" role="tab" aria-selected="true">Ask</button>
      <button id="tabPortfolio" role="tab" aria-selected="false">Portfolio</button>
    </div>

    <div id="feed"></div>

    <div id="composer">
      <input id="ask" placeholder="Ask Snappy…" autocomplete="off" spellcheck="false">
      <span id="send">↵</span>
    </div>
    <!-- Snappy now writes analyst-grade commentary on real positions. That is
         analysis, not advice, and the difference should be on the face of it. -->
    <div class="disclaimer">Analysis, not financial advice.</div>
  </div>

<script>
  // ---- bridge back to Python ------------------------------------------
  // Registered by ui.py as a WKScriptMessageHandler named "snappy". Guarded so the
  // page still renders when opened in a plain browser for design work.
  const send = (msg) => window.webkit?.messageHandlers?.snappy?.postMessage(msg);

  document.getElementById('close').onclick = () => send({type: 'close'});

  const ask = document.getElementById('ask');
  ask.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && ask.value.trim()) {
      send({type: 'ask', text: ask.value.trim()});
      ask.value = '';
    } else if (e.key === 'Escape') {
      ask.blur();
      send({type: 'close'});
    }
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') send({type: 'close'});
  });

  window.focusComposer = () => ask.focus();

  // ---- waveform --------------------------------------------------------
  const wave = document.getElementById('wave');
  const BARS = 27;
  for (let i = 0; i < BARS; i++) wave.appendChild(document.createElement('i'));
  const bars = [...wave.children];

  // Centre bars react most, edges least — reads as a voice, not a bar chart.
  const shape = bars.map((_, i) => {
    const d = Math.abs(i - (BARS - 1) / 2) / ((BARS - 1) / 2);
    return 1 - d * d * 0.85;
  });

  window.setLevel = (level) => {
    for (let i = 0; i < BARS; i++) {
      const j = 0.75 + Math.random() * 0.5;   // jitter: sound, not a meter
      bars[i].style.height = (3 + level * 29 * shape[i] * j).toFixed(1) + 'px';
    }
  };

  const money = (v) => v == null ? '—'
    : '$' + v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

  const esc = (s) => (s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

  // Just enough markdown for what Claude actually emits: **bold** and "- " bullets.
  const fmt = (s) => esc(s)
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .split('\n').filter(l => l.trim())
    .map(l => `<div>${l.replace(/^-\s*/, '· ')}</div>`).join('');

  const traceHTML = (calls) => !calls.length ? '' :
    `<div class="trace">${calls.map(c => `
      <div class="row">
        <span class="dot"></span>
        <span class="nm">${esc(c.name)}</span>
        <span class="qy">${esc(c.detail || '')}</span>
        <span class="ms">${c.ms >= 1000 ? (c.ms/1000).toFixed(1)+'s' : c.ms+'ms'}</span>
      </div>`).join('')}</div>`;

  const srcHTML = (sources) => !sources.length ? '' :
    `<div class="src">${sources.slice(0, 6).map(s =>
      `<span>${esc(new URL(s.url).hostname.replace(/^www\./, ''))}</span>`).join('')}</div>`;

  const answerHTML = (text, streaming) => {
    if (!text) return streaming ? '<div class="ans"><span class="caret"></span></div>' : '';
    const [lead, ...rest] = text.split('\n\n');
    return `<div class="ans">
      <div class="lead">${esc(lead)}${streaming && !rest.length ? '<span class="caret"></span>' : ''}</div>
      ${rest.length ? `<div class="det">${fmt(rest.join('\n'))}${streaming ? '<span class="caret"></span>' : ''}</div>` : ''}
    </div>`;
  };

  const turnHTML = (t, live) => `
    <div class="card">
      ${t.question ? `<div class="q">${esc(t.question)}</div>` : ''}
      ${traceHTML(t.calls || [])}
      ${answerHTML(t.answer, live)}
      ${srcHTML(t.sources || [])}
    </div>`;

  // The confirmation card. Nothing here can place an order — the buttons only
  // post a message; Python decides. See trading.py.
  const batchHTML = (t) => `
    <div class="trade">
      <div class="top">
        <span class="act">CANCEL ${t.orders.length} ORDER${t.orders.length === 1 ? '' : 'S'}</span>
        <span class="qty">${t.symbol ? esc(t.symbol) : 'all symbols'}</span>
      </div>
      <div class="batch">
        ${t.orders.map(o => `<div class="brow">
          <span>${esc(o.action)} ${o.units}</span>
          <span class="bsym">${esc(o.symbol)}</span>
          <span class="bst">${esc(o.status)}</span>
        </div>`).join('')}
      </div>
      ${acctHTML(t)}
      <div class="row2">
        <button class="go" id="btnGo">Confirm</button>
        <button class="no" id="btnNo">Dismiss</button>
      </div>
      <div class="say">press ⌥ and say “confirm”, or type it</div>
    </div>`;

  // Which account this lands in. Shown on every confirmation card: with more than one
  // account, "BUY 5 NVDA" is an incomplete description of what is about to happen.
  const acctHTML = (t) =>
    t.account_label ? `<div class="acct">→ ${esc(t.account_label)}</div>` : '';

  const tradeHTML = (t, total) => {
    if (t.kind === 'cancel_all') return batchHTML(t);
    const killing = t.kind === 'cancel';
    const pct = (!killing && total) ? (100 * t.estimated_cost / total) : null;
    return `<div class="trade">
      <div class="top">
        <span class="act">${killing ? 'CANCEL ORDER' : esc(t.action)}</span>
        <span class="sym">${esc(t.symbol)}</span>
        <span class="qty">${t.units} share${t.units == 1 ? '' : 's'}</span>
      </div>
      ${killing
        ? `<div class="cost" style="font-size:17px">Call back the ${esc((t.action||'').toLowerCase())} order</div>
           <div class="of">It won't fill at the next open.</div>`
        : `${t.description ? `<div class="co">${esc(t.description)}</div>` : ''}
           <div class="cost">${money(t.estimated_cost)}</div>
           <div class="of">
             ${pct != null ? `${pct.toFixed(2)}% of your portfolio` : ''}
             ${t.price != null ? ` · at ${money(t.price)}/share` : ''}
           </div>`}
      ${acctHTML(t)}
      <div class="row2">
        <button class="go" id="btnGo">Confirm</button>
        <button class="no" id="btnNo">Dismiss</button>
      </div>
      <div class="say">press ⌥ and say “confirm”, or type it</div>
    </div>`;
  };

  // "Buy one share of Micron" — in WHICH account? Snappy doesn't decide that. It
  // shows every account you could trade in and waits for a click. Nothing is priced
  // until you pick: the preview has to be run against a real account, so there is no
  // honest number to show you before then.
  const chooseHTML = (c) => `
    <div class="trade pick">
      <div class="top">
        <span class="act">${esc(c.action)}</span>
        <span class="sym">${esc(c.symbol)}</span>
        <span class="qty">${c.units} share${c.units == 1 ? '' : 's'}</span>
      </div>
      <div class="of" style="margin-bottom:8px">Which account?</div>
      ${c.accounts.map(a => `
        <button class="opt" data-account="${esc(a.account_id)}">
          <span class="nm">${esc(a.label)}</span>
          <span class="vl">${money((a.total_value || {}).amount)}</span>
        </button>`).join('')}
      <div class="row2" style="margin-top:8px">
        <button class="no" id="btnNo" style="flex:1">Dismiss</button>
      </div>
    </div>`;

  // The clock runs in the PAGE, not in Python. Python only says when it last read the
  // portfolio; the page counts up from there. So the seconds keep ticking between
  // refreshes instead of the panel sitting frozen and looking broken.
  let lastRead = null;    // epoch seconds of the last real portfolio read

  // Every number on screen, keyed, as it was on the LAST render. After each render we
  // walk the new ones and flash only those that actually moved — flashing everything
  // on every push would be noise, and noise is indistinguishable from nothing.
  const seen = new Map();
  let firstPaint = true;

  // Which pane is showing. Lives here, not in Python — switching tabs is not a thing
  // the backend needs to know about, and a round-trip would make it feel sticky.
  let tab = 'ask';
  let lastQuestion = null;
  let lastState = null;   // so a tab click can re-render without waiting for a push

  const syncTabs = () => {
    document.getElementById('tabAsk').setAttribute('aria-selected', tab === 'ask');
    document.getElementById('tabPortfolio').setAttribute('aria-selected', tab === 'portfolio');
  };

  const showTab = (which) => {
    if (tab === which) return;
    tab = which;
    if (lastState) setState(lastState);   // re-render the pane, with the state we have
  };

  document.getElementById('tabAsk').onclick = () => showTab('ask');
  document.getElementById('tabPortfolio').onclick = () => showTab('portfolio');

  const markMoves = (root) => {
    const changed = [];
    for (const el of root.querySelectorAll('[data-k]')) {
      const key = el.dataset.k;
      const now = parseFloat(el.dataset.v);
      const before = seen.get(key);
      if (!Number.isNaN(now)) {
        // Nothing "changed" on the first paint — it all just appeared. Flashing the
        // whole panel green the moment it opens would be a lie about what just happened.
        if (!firstPaint && before !== undefined && now !== before) {
          el.classList.remove('up', 'down');
          void el.offsetWidth;                        // restart the animation
          el.classList.add(now > before ? 'up' : 'down');
          changed.push({ key, from: before, to: now });
        }
        seen.set(key, now);
      }
    }
    firstPaint = false;
    return changed;
  };

  // Which account rows the user has opened. The feed is rebuilt from scratch on EVERY
  // push — including the 30s background refresh — so without this an expanded account
  // would snap shut under the user's cursor a few seconds after they opened it.
  const openAccounts = new Set();

  const accountRowHTML = (a) => `
    <div class="acct ${openAccounts.has(a.account_id) ? 'open' : ''}">
      <button class="hdr" data-acct="${esc(a.account_id)}"
              aria-expanded="${openAccounts.has(a.account_id)}">
        <span class="caretx">▶</span>
        <span class="nm">${esc(a.label)}</span>
        <span class="amt" data-k="acct:${esc(a.account_id)}" data-v="${a.total_value}"
          >${money(a.total_value)}</span>
      </button>
      <div class="body">
        ${a.error ? `<div class="empty">Couldn't read this account: ${esc(a.error)}</div>`
          : a.positions.length
            ? `<table>${a.positions.map(p => `<tr>
                 <td class="sym">${esc(p.symbol)}</td>
                 <td class="num wt">${p.units}</td>
                 <td class="num" data-k="ap:${esc(a.account_id)}:${esc(p.symbol)}"
                     data-v="${(p.units || 0) * (p.price || 0)}"
                   >${money((p.units || 0) * (p.price || 0))}</td>
               </tr>`).join('')}</table>`
            : `<div class="empty">No positions.</div>`}
        ${(a.unsynced_fills || []).length
          ? `<div class="empty" style="color:var(--amber)">
               ${a.unsynced_fills.map(g => `${g.missing_units} ${esc(g.symbol)}`).join(', ')}
               filled, not yet synced by SnapTrade
             </div>` : ''}
        <div class="cashrow"><span>Cash</span><span>${money(a.cash)}</span></div>
      </div>
    </div>`;

  const drawFresh = () => {
    const el = document.getElementById('fresh');
    if (!el) return;
    if (!lastRead) { el.innerHTML = ''; return; }
    const secs = Math.max(0, Math.round(Date.now() / 1000 - lastRead));
    const ago = secs < 5 ? 'just now'
              : secs < 60 ? `${secs}s ago`
              : `${Math.floor(secs / 60)}m ago`;
    el.innerHTML = `<i></i>updated ${ago}`;
  };
  setInterval(drawFresh, 1000);

  window.setState = (s) => {
    lastState = s;
    document.body.dataset.status = s.status;
    document.body.dataset.hotkey = s.hotkey_ok === false ? 'off' : 'on';
    document.getElementById('statusText').textContent = {
      idle: 'Ready', listening: 'Listening', thinking: 'Working',
      answered: 'Ready', confirming: 'Confirm?', choosing: 'Which account?',
    }[s.status] || 'Ready';

    const valueEl = document.getElementById('value');
    const before = seen.get('net');
    valueEl.textContent = money(s.total_value);
    valueEl.dataset.k = 'net';
    valueEl.dataset.v = s.total_value ?? '';

    // A direction with no size is a shrug. Say how much it moved.
    const deltaEl = document.getElementById('delta');
    if (before !== undefined && s.total_value != null && s.total_value !== before) {
      const diff = s.total_value - before;
      const up = diff > 0;
      deltaEl.className = `delta show ${up ? 'up' : 'down'}`;
      deltaEl.textContent =
        `${up ? '▲' : '▼'} ${money(Math.abs(diff))}`;
    }

    document.getElementById('sub').textContent = s.sub || '';

    // A re-read landed: pulse the dot, and restart the "ago" counter.
    if (s.updated_at && s.updated_at !== lastRead) {
      lastRead = s.updated_at;
      const dot = document.getElementById('fresh');
      dot.classList.remove('beat');
      void dot.offsetWidth;
      dot.classList.add('beat');
    }
    drawFresh();

    // PINNED — actionable, and shown on both tabs. A trade waiting for your approval
    // must never be hidden behind a tab you aren't looking at.
    const pinned = [];
    if (s.notice) pinned.push(`<div class="notice">${esc(s.notice)}</div>`);
    if (s.choose) pinned.push(chooseHTML(s.choose));
    if (s.pending) pinned.push(tradeHTML(s.pending, s.total_value));
    document.getElementById('pinned').innerHTML = pinned.join('');

    // A new question pulls you back to Ask — you asked it, you want to see it. But
    // only on a NEW one: yanking the tab out from under someone browsing their
    // holdings, every time a background refresh landed, would be maddening.
    const live = s.question || s.answer;
    if (s.question && s.question !== lastQuestion) {
      lastQuestion = s.question;
      tab = 'ask';
    }
    syncTabs();

    const feed = document.getElementById('feed');
    const parts = [];

    if (tab === 'ask') {
      feed.dataset.empty = 'Hold ⌥ and ask. Or type below.';
      if (live) parts.push(turnHTML(s, s.status === 'thinking'));
      for (const h of s.history) parts.push(turnHTML(h, false));

      if (!parts.length) {
        parts.push(`<div class="card hint">
          <span class="opt">Hold <kbd>⌥</kbd>, speak, let go.</span> Or type below.<br>
          <span style="opacity:.7">Clicking the icon just shows this panel.</span><br>
          <kbd>What's my balance?</kbd> <kbd>Do I own NVDA anywhere?</kbd><br>
          <kbd>How would 5 shares of SpaceX fit?</kbd><br>
          <kbd>Buy one share of Micron</kbd>
        </div>`);
      }
    } else {
      // PORTFOLIO — always here, however long the conversation gets. This is the whole
      // point of the split: your holdings used to sink below a screen and a half of
      // trade confirmations.
      feed.dataset.empty = 'No holdings yet.';

      if ((s.accounts || []).length > 1) {
        parts.push(`<div class="card">
          <div class="hd">Accounts</div>
          ${s.accounts.map(accountRowHTML).join('')}
        </div>`);
      }

      if (s.positions.length) {
        // held_in > 1 is the number no single brokerage can show you: the same stock,
        // split across accounts, looking small twice.
        parts.push(`<div class="card">
          <div class="hd">Holdings · all accounts</div>
          <table>${s.positions.map(p => `<tr>
            <td class="sym">${esc(p.symbol)}${
              p.held_in > 1 ? `<span class="split">${p.held_in} accts</span>` : ''}</td>
            <td class="num wt">${p.units}</td>
            <td class="num" data-k="mv:${esc(p.symbol)}" data-v="${p.market_value}">${money(p.market_value)}</td>
            <td class="num wt" data-k="wt:${esc(p.symbol)}" data-v="${p.weight_pct}">${p.weight_pct}%</td>
          </tr>`).join('')}</table>
        </div>`);
      }
    }

    feed.innerHTML = parts.join('');

    // The feed is rebuilt on every push, so the buttons are new elements each
    // time and have to be re-bound. They only post a message — Python decides
    // whether anything is placed.
    const go = document.getElementById('btnGo');
    const no = document.getElementById('btnNo');
    if (go) go.onclick = () => send({type: 'confirm'});
    if (no) no.onclick = () => send({type: 'cancel'});

    // Picking an account is not the same as agreeing to the trade — this only says
    // WHERE. The confirm card comes next, priced, and still has to be accepted.
    //
    // Scoped to the DOCUMENT, not to #feed. The trade card and the account picker moved
    // into #pinned when the tabs landed, and this kept searching #feed — so the buttons
    // rendered perfectly and had no handler attached at all. Clicking them did nothing,
    // silently. Every actionable control in this app is now bound document-wide, because
    // "which container is it in today" is not something a click handler should depend on.
    for (const b of document.querySelectorAll('[data-account]')) {
      b.onclick = () => send({type: 'account', account_id: b.dataset.account});
    }

    // Now that the DOM exists, compare every number against the last render and flash
    // the ones that moved. Must run AFTER innerHTML — before it, we'd be diffing the
    // previous frame against itself.
    markMoves(document.body);

    // Expanding an account is purely local — no round-trip to Python, and nothing to
    // wait for. The Set is what survives the next re-render.
    for (const b of document.querySelectorAll('[data-acct]')) {
      b.onclick = () => {
        const id = b.dataset.acct;
        const open = !openAccounts.has(id);
        open ? openAccounts.add(id) : openAccounts.delete(id);
        b.parentElement.classList.toggle('open', open);
        b.setAttribute('aria-expanded', String(open));
      };
    }
  };
</script>
</body>
</html>
